<div class="not-found-page">
  <div
    class="not-found-page__toolbar"
    aria-label="Appearance and language settings"
  >
    <app-appearance-theme-toggle />
    <app-appearance-configurator-trigger [showMenuMode]="false" />
    <app-language-selector-trigger />
  </div>

  <div class="not-found-page__glow not-found-page__glow--primary" aria-hidden="true"></div>
  <div class="not-found-page__glow not-found-page__glow--secondary" aria-hidden="true"></div>

  <main class="not-found-page__content">
    <section class="not-found-page__card">
      <div class="not-found-page__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M15.94 7.62l-4.88 2a2.63 2.63 0 0 0-1.48 1.48l-2 4.88a.34.34 0 0 0 .19.44.36.36 0 0 0 .25 0l4.88-2a2.63 2.63 0 0 0 1.48-1.48l2-4.88a.34.34 0 0 0-.19-.44.36.36 0 0 0-.25 0ZM12 13a1 1 0 1 1 1-1 1 1 0 0 1-1 1Z"
          />
          <path
            d="M12 21a9 9 0 1 1 9-9 9 9 0 0 1-9 9Zm0-16.5A7.5 7.5 0 1 0 19.5 12 7.5 7.5 0 0 0 12 4.5Z"
          />
        </svg>
      </div>

      <p class="not-found-page__code">{{ vm().code }}</p>

      <h1 class="not-found-page__title">{{ vm().title }}</h1>
      <p class="not-found-page__subtitle">{{ vm().subtitle }}</p>

      <div class="not-found-page__actions">
        <p-button
          [label]="vm().backHome"
          icon="pi pi-home"
          routerLink="/home"
          styleClass="not-found-page__button"
        />
        <p-button
          [label]="vm().goBack"
          icon="pi pi-arrow-left"
          [outlined]="true"
          severity="secondary"
          styleClass="not-found-page__button"
          (onClick)="goBack()"
        />
      </div>
    </section>
  </main>
</div>
