<div class="flex flex-col gap-4">
  <div>
    <span class="text-sm text-muted-color font-semibold">Primary</span>
    <div class="pt-2 flex gap-2 flex-wrap justify-start">
      @for (primaryColor of appearance.primaryColors(); track primaryColor.name) {
        <button
          type="button"
          [title]="primaryColor.name"
          (click)="updateColors($event, 'primary', primaryColor)"
          [class]="{
            'outline outline-primary': primaryColor.name === appearance.primary(),
          }"
          [style]="{
            'background-color':
              primaryColor?.name === 'noir' ? 'var(--text-color)' : primaryColor?.palette?.['500'],
          }"
          class="cursor-pointer w-5 h-5 rounded-full flex shrink-0 items-center justify-center outline-offset-1 shadow"
        ></button>
      }
    </div>
  </div>
  <div>
    <span class="text-sm text-muted-color font-semibold">Surface</span>
    <div class="pt-2 flex gap-2 flex-wrap justify-start">
      @for (surface of appearance.surfaces; track surface.name) {
        <button
          type="button"
          [title]="surface.name"
          (click)="updateColors($event, 'surface', surface)"
          [class]="{
            'outline outline-primary': appearance.surface()
              ? appearance.surface() === surface.name
              : appearance.darkTheme()
                ? surface.name === 'zinc'
                : surface.name === 'slate',
          }"
          [style]="{
            'background-color': surface?.palette?.['500'],
          }"
          class="cursor-pointer w-5 h-5 rounded-full flex shrink-0 items-center justify-center p-0 outline-offset-1"
        ></button>
      }
    </div>
  </div>
  <div class="flex flex-col gap-2">
    <span class="text-sm text-muted-color font-semibold">Presets</span>
    <p-selectbutton
      [options]="appearance.presets"
      [ngModel]="appearance.preset()"
      (ngModelChange)="appearance.changePreset($event)"
      [allowEmpty]="false"
      size="small"
    />
  </div>
  @if (showMenuMode()) {
    <div class="flex flex-col gap-2">
      <span class="text-sm text-muted-color font-semibold">Menu Mode</span>
      <p-selectbutton
        [ngModel]="appearance.menuMode()"
        (ngModelChange)="appearance.changeMenuMode($event)"
        [options]="appearance.menuModeOptions"
        [allowEmpty]="false"
        size="small"
      />
    </div>
  }
</div>
